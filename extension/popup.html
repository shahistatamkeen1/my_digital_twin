<!DOCTYPE html>
<html>
  <head>
    <title>My Digital Twin Autofill</title>
    <style>
      body {
        width: 380px;
        font-family: Arial, sans-serif;
        background: #020617;
        color: white;
        padding: 16px;
      }

      h1 {
        font-size: 18px;
        margin-bottom: 8px;
      }

      p {
        color: #94a3b8;
        font-size: 13px;
      }

      textarea,
      input {
        width: 100%;
        margin-top: 8px;
        padding: 8px;
        border-radius: 8px;
        border: none;
        background: #0f172a;
        color: white;
        box-sizing: border-box;
      }

      textarea {
        height: 90px;
      }

      button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        color: white;
        font-weight: bold;
      }

      #saveProfileBtn {
        background: #334155;
      }

      #scanBtn {
        background: #4f46e5;
      }

      #fillBtn {
        background: #ea580c;
      }

      pre {
        background: #0f172a;
        padding: 10px;
        border-radius: 8px;
        max-height: 220px;
        overflow: auto;
        font-size: 12px;
        white-space: pre-wrap;
      }
    </style>
  </head>

  <body>
    <h1>My Digital Twin</h1>
    <p>Save your profile once, then scan and fill job application answers.</p>

    <input id="roleInput" placeholder="Target Role, e.g. AI Engineer" />

    <textarea
      id="careerGoalInput"
      placeholder="Career Goal, e.g. I want to become an AI Engineer..."
    ></textarea>

    <textarea
      id="resumeInput"
      placeholder="Paste resume text here..."
    ></textarea>

    <button id="saveProfileBtn">Save Extension Profile</button>

    <button id="scanBtn">Scan Page Fields</button>
    <button id="fillBtn">Fill Suggested Answers</button>

    <pre id="output">No fields scanned yet.</pre>

    <script src="popup.js"></script>
  </body>
</html>
